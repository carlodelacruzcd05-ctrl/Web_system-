<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock2</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: lightgreen;
      color: white;
      margin: 0;
      padding: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      align-items: center;
    }

    .card {
      background: ivory;
      color: Khaki;
      border-radius: 8px;
      overflow: hidden;
      text-align: center;
      padding-bottom: 15px;
    }

    .card img.main {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .name {
      font-weight: bold;
      margin: 10px 0 5px;
    }

    .friends {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 14px;
      color: blue;
      margin-bottom: 10px;
    }

    .friends img {
      width: 20px;
      height: 10px;
      border-radius: 20%;
    }

    button {
      background: skyblue;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: red;
    }
  </style>
</head>

<body>
  <div class="grid">

    <div class="card">
      <img class="main" src="12.jpg">
      <div class="name">Oliver</div>
      <div class="friends">
        2 mutual friends
      </div>
      <button>Add Friend</button>
    </div>
    <div class="card">
      <img class="main" src="oliver.jpg">
      <div class="name">Mimi</div>
      <div class="friends">
        3 mutual friends
      </div>
      <button>Add Friend</button>
    </div>
    <div class="card">
      <img class="main" src="rex.jpg">
      <div class="name">Rex</div>
      <div class="friends">
        4 mutual friends
      </div>
      <button>Add Friend</button>
    </div>

  </div>

</body>
</html>
